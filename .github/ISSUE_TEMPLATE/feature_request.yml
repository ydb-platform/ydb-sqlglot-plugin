name: "Feature Request"
description: "Suggest a new feature or improvement"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        Please describe what you'd like to see added to the plugin.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "A clear and concise description of the feature you'd like"
      placeholder: "Describe the feature..."
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: "Any additional information about the feature request"
    validations:
      required: false
