name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/

  unit-sqlglot-compat:
    # Guards against API changes across the sqlglot range supported in pyproject.toml.
    # `latest` is unpinned so new releases surface as a CI failure instead of a user bug.
    name: Unit tests (sqlglot ${{ matrix.sqlglot-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sqlglot-version:
          - "28.6.0"     # minimum supported (pyproject.toml)
          - "28.10.1"    # last 28.x; expression(cls, **kwargs) API
          - "29.0.1"     # last 29.x
          - "30.0.0"     # expression(instance) API introduced
          - "latest"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pin sqlglot==${{ matrix.sqlglot-version }}
        if: matrix.sqlglot-version != 'latest'
        run: pip install "sqlglot==${{ matrix.sqlglot-version }}"

      - name: Upgrade sqlglot to latest
        if: matrix.sqlglot-version == 'latest'
        run: pip install --upgrade sqlglot

      - name: Show resolved sqlglot version
        run: python -c "import sqlglot; print('sqlglot', sqlglot.__version__)"

      - name: Run unit tests
        run: pytest tests/unit/

  integration:
    name: Integration tests (YDB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start YDB
        run: docker compose up -d

      - name: Wait for YDB to be ready
        run: |
          python - <<'EOF'
          import time, sys
          import ydb
          for i in range(60):
              driver = None
              try:
                  driver = ydb.Driver(
                      endpoint="grpc://localhost:2136",
                      database="/local",
                      credentials=ydb.AnonymousCredentials(),
                  )
                  driver.wait(timeout=3, fail_fast=True)
                  with ydb.QuerySessionPool(driver) as pool:
                      pool.execute_with_retries(
                          "CREATE TABLE IF NOT EXISTS `_ready_check` "
                          "(id Int64 NOT NULL, PRIMARY KEY (id))"
                      )
                      pool.execute_with_retries("DROP TABLE IF EXISTS `_ready_check`")
                  print(f"YDB ready after {(i+1)*2}s")
                  sys.exit(0)
              except Exception as e:
                  print(f"attempt {i+1}/60: {e}")
                  time.sleep(2)
              finally:
                  if driver:
                      try:
                          driver.stop()
                      except Exception:
                          pass
          print("YDB not ready after 120s")
          sys.exit(1)
          EOF

      - name: Run integration tests
        run: pytest tests/integration/ -v

      - name: Stop YDB
        if: always()
        run: docker compose down

  benchmarks:
    name: Benchmark tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start YDB
        run: docker compose up -d

      - name: Wait for YDB to be ready
        run: |
          python - <<'EOF'
          import time, sys
          import ydb
          for i in range(60):
              driver = None
              try:
                  driver = ydb.Driver(
                      endpoint="grpc://localhost:2136",
                      database="/local",
                      credentials=ydb.AnonymousCredentials(),
                  )
                  driver.wait(timeout=3, fail_fast=True)
                  with ydb.QuerySessionPool(driver) as pool:
                      pool.execute_with_retries(
                          "CREATE TABLE IF NOT EXISTS `_ready_check` "
                          "(id Int64 NOT NULL, PRIMARY KEY (id))"
                      )
                      pool.execute_with_retries("DROP TABLE IF EXISTS `_ready_check`")
                  print(f"YDB ready after {(i+1)*2}s")
                  sys.exit(0)
              except Exception as e:
                  print(f"attempt {i+1}/60: {e}")
                  time.sleep(2)
              finally:
                  if driver:
                      try:
                          driver.stop()
                      except Exception:
                          pass
          print("YDB not ready after 120s")
          sys.exit(1)
          EOF

      - name: Run benchmark tests
        run: pytest tests/benchmarks/ -v

      - name: Stop YDB
        if: always()
        run: docker compose down
