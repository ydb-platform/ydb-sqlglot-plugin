name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/test_ydb.py

  integration:
    name: Integration tests (YDB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start YDB
        run: docker compose up -d

      - name: Wait for YDB to be ready
        run: |
          python - <<'EOF'
          import socket, time, sys
          for i in range(30):
              try:
                  s = socket.create_connection(("localhost", 2136), timeout=1)
                  s.close()
                  print(f"YDB ready after {i+1}s")
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
          print("YDB did not become ready in time")
          sys.exit(1)
          EOF

      - name: Run integration tests
        run: pytest tests/test_integration.py -v

      - name: Stop YDB
        if: always()
        run: docker compose down

  benchmarks:
    name: Benchmark tests (ClickBench + TPC-H)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ClickBench unit tests
        run: pytest tests/test_clickbench.py

      - name: Run TPC-H unit tests
        run: pytest tests/test_tpch.py

      - name: Start YDB
        run: docker compose up -d

      - name: Wait for YDB to be ready
        run: |
          python - <<'EOF'
          import socket, time, sys
          for i in range(30):
              try:
                  s = socket.create_connection(("localhost", 2136), timeout=1)
                  s.close()
                  print(f"YDB ready after {i+1}s")
                  sys.exit(0)
              except OSError:
                  time.sleep(1)
          print("YDB did not become ready in time")
          sys.exit(1)
          EOF

      - name: Run ClickBench integration tests
        run: pytest tests/test_clickbench_integration.py -v

      - name: Run TPC-H integration tests
        run: pytest tests/test_tpch_integration.py -v

      - name: Stop YDB
        if: always()
        run: docker compose down
